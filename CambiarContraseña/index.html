<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - AlertaVital</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f2f0f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 450px; width: 90%; border-top: 5px solid #6A5ACD; }
        .logo { margin-bottom: 25px; }
        .logo img { max-width: 130px; height: auto; }
        h1 { margin-bottom: 10px; font-size: 1.8em; color: #333; }
        p { font-size: 1.1em; line-height: 1.5; color: #555; }
        #form-container input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        #form-container input:focus { border-color: #6A5ACD; outline: none; }
        #submitButton { width: 100%; background-color: #FF6347; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        #submitButton:hover { background-color: #e55337; }
        #submitButton:disabled { background-color: #ccc; cursor: not-allowed; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { margin-top: 20px; font-weight: 500; }
        .message.success { color: #28a745; }
        .message.error { color: #dc3545; }
        .login-link { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="AlertaVital.png" alt="Logo AlertaVital">
        </div>
        <h1 id="title">Restablecer tu Contraseña</h1>
        
        <div id="form-container">
            <p>Ingresa tu nueva contraseña. Debe tener al menos 6 caracteres.</p>
            <input type="password" id="password" placeholder="Nueva contraseña" required>
            <input type="password" id="confirmPassword" placeholder="Confirmar nueva contraseña" required>
            <button id="submitButton">Actualizar Contraseña</button>
        </div>
        
        <div id="loader" style="display: none;"></div>
        <p id="message" class="message"></p>
    </div>

    <script>
        const BACKEND_URL = 'https://alertavital.xyz';

        window.onload = () => {
            const titleEl = document.getElementById('title');
            const formContainer = document.getElementById('form-container');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const submitButton = document.getElementById('submitButton');
            const loader = document.getElementById('loader');
            const messageEl = document.getElementById('message');
            const loginLink = document.getElementById('login-link');

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                formContainer.style.display = 'none';
                titleEl.textContent = 'Enlace Inválido';
                messageEl.textContent = 'El enlace para restablecer la contraseña no es válido o está incompleto.';
                messageEl.className = 'message error';
                return;
            }

            submitButton.addEventListener('click', async () => {
                const newPassword = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                // Validaciones
                if (newPassword.length < 6) {
                    messageEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                    messageEl.className = 'message error';
                    return;
                }
                if (newPassword !== confirmPassword) {
                    messageEl.textContent = 'Las contraseñas no coinciden.';
                    messageEl.className = 'message error';
                    return;
                }

                // Inicia el proceso de envío
                messageEl.textContent = '';
                submitButton.disabled = true;
                loader.style.display = 'block';

                try {
                    const response = await fetch(`${BACKEND_URL}/api/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: token, newPassword: newPassword })
                    });
                    
                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Ocurrió un error desconocido.');
                    }

                    // Éxito
                    formContainer.style.display = 'none';
                    titleEl.textContent = '¡Contraseña Actualizada!';
                    messageEl.textContent = data.message;
                    messageEl.className = 'message success';
                    loginLink.style.display = 'inline-block';

                } catch (error) {
                    messageEl.textContent = error.message;
                    messageEl.className = 'message error';
                    submitButton.disabled = false;
                } finally {
                    loader.style.display = 'none';
                }
            });
        };
    </script>
</body>
</html>
